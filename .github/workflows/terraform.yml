name: Terraform CI/CD

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

env:
  TF_CLOUD_ORGANIZATION: "Teleios"
  AWS_DEFAULT_REGION: "us-east-1"

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_version: 1.6.0

      - name: Set workspace and backend key based on branch
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "TF_WORKSPACE=teleios-light-prod" >> $GITHUB_ENV
            echo "BACKEND_KEY=prod/terraform.tfstate" >> $GITHUB_ENV
          else
            echo "TF_WORKSPACE=teleios-light-dev" >> $GITHUB_ENV
            echo "BACKEND_KEY=dev/terraform.tfstate" >> $GITHUB_ENV
          fi

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=light-teleios-s3-medicare-state-221693237976-us-east-1-an" \
            -backend-config="key=${{ env.BACKEND_KEY }}" \
            -backend-config="region=us-east-1" \
            -backend-config="encrypt=true"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -var-file="environments/dev/terraform.tfvars" -out=tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}

      - name: Terraform Apply
        if: github.event_name == 'push'
        working-directory: terraform
        run: terraform apply -auto-approve tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
          TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
